<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ SITENAME }}{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ SITEURL }}/{{ THEME_STATIC_DIR }}/css/style.css">
</head>

<body>
    <header class="site-header">
        <div class="site-title">
            <a href="{{ SITEURL }}/">{{ SITENAME }}</a>
        </div>

        <nav class="site-nav">
            {% for title, link in MENUITEMS %}
                <a href="{{ link }}">{{ title }}</a>
            {% endfor %}

            {% for p in pages %}
                <a href="{{ SITEURL }}/{{ p.url }}">{{ p.title }}</a>
            {% endfor %}
        </nav>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>{{ SITENAME }}</p>
    </footer>
</body>
</html>
