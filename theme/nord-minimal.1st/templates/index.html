{% extends "base.html" %}

{% block content %}
    {% for article in articles_page.object_list %}
        <article class="article-preview">
            <h1>
                <a href="{{ SITEURL }}/{{ article.url }}">{{ article.title }}</a>
            </h1>

            <div class="meta">
                {{ article.locale_date }}
            </div>

            {% if article.summary %}
                <p>{{ article.summary }}</p>
            {% endif %}
        </article>
    {% endfor %}
{% endblock %}
